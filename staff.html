<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هيئة التدريس - قسم اضطراب التوحد - كلية علوم ذوي الاحتياجات الخاصة - جامعة بني سويف</title>
  <meta name="description" content="أعضاء هيئة التدريس والمعيدون - قسم اضطراب التوحد - كلية علوم ذوي الاحتياجات الخاصة - جامعة بني سويف">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <style>

    .staff-page { padding: 36px 0; }

    /* ===== رئيس القسم ===== */
    .head-section {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 32px;
    }
    .head-section-header {
      background: var(--color-primary);
      color: #fff;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 700;
      border-bottom: 3px solid var(--color-gold);
    }
    .head-card {
      display: flex;
      gap: 28px;
      padding: 24px;
      align-items: flex-start;
    }
    .head-img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      object-position: top;
      border-radius: 50%;
      flex-shrink: 0;
      border: 4px solid var(--color-border);
      background: var(--color-primary-light);
    }
    .head-img-placeholder {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-mid));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .head-info { flex: 1; }
    .head-info h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 4px;
    }
    .head-info .head-title {
      font-size: 13px;
      color: var(--color-gold);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .head-info .head-spec {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 14px;
    }
    .head-info .head-bio {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.9;
      margin-bottom: 16px;
    }
    .head-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ===== عنوان المجموعة ===== */
    .group-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-primary);
      padding: 10px 16px;
      background: var(--color-primary-light);
      border-right: 4px solid var(--color-primary);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 18px;
    }
    .group-section { margin-bottom: 36px; }

    /* ===== بطاقة عضو هيئة التدريس ===== */
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .staff-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition);
      text-align: center;
    }
    .staff-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-primary);
      transform: translateY(-2px);
    }
    .staff-card-img-wrap {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--color-primary-light);
      margin: 20px auto 0;
      border: 3px solid var(--color-border);
    }
    .staff-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
    .staff-card-img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-mid));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .staff-card-body { padding: 14px 12px; }
    .staff-card-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 3px;
      line-height: 1.4;
    }
    .staff-card-title {
      font-size: 12px;
      color: var(--color-gold);
      font-weight: 700;
      margin-bottom: 3px;
    }
    .staff-card-spec {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .staff-card-email {
      font-size: 11px;
      color: var(--color-primary);
      word-break: break-all;
      margin-bottom: 10px;
    }
    .staff-card-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--color-border);
    }
    .btn-sm {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      transition: var(--transition);
      border: 1.5px solid transparent;
      cursor: pointer;
      font-family: var(--font-main);
    }
    .btn-sm-primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .btn-sm-primary:hover { background: var(--color-primary-mid); }
    .btn-sm-outline {
      background: transparent;
      color: var(--color-primary);
      border-color: var(--color-primary);
    }
    .btn-sm-outline:hover {
      background: var(--color-primary);
      color: #fff;
    }

    /* ===== بطاقة المعيدين (أصغر) ===== */
    .assistants-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }
    .assistant-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition);
      text-align: center;
    }
    .assistant-card:hover {
      box-shadow: var(--shadow-sm);
      border-color: var(--color-primary);
    }
    .assistant-card-img-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--color-primary-light);
      margin: 14px auto 0;
      border: 2px solid var(--color-border);
    }
    .assistant-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
    .assistant-card-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a5fa8, var(--color-primary-mid));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .assistant-card-body { padding: 10px 8px; }
    .assistant-card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 2px;
      line-height: 1.4;
    }
    .assistant-card-title {
      font-size: 11px;
      color: var(--color-gold);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .assistant-card-spec {
      font-size: 11px;
      color: var(--color-text-muted);
    }

    /* ===== مودال التفاصيل ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      background: var(--color-primary);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
      transition: var(--transition);
    }
    .modal-close:hover { opacity: 1; }
    .modal-body { padding: 24px; }
    .modal-person {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      align-items: flex-start;
    }
    .modal-person-img {
      width: 110px;
      height: 130px;
      object-fit: cover;
      object-position: top;
      border-radius: var(--radius-sm);
      border: 2px solid var(--color-border);
      flex-shrink: 0;
      background: var(--color-primary-light);
    }
    .modal-person-info h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 4px;
    }
    .modal-person-info .m-title {
      font-size: 13px;
      color: var(--color-gold);
      font-weight: 700;
      margin-bottom: 3px;
    }
    .modal-person-info .m-spec {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .modal-person-info .m-email {
      font-size: 12px;
      color: var(--color-primary);
    }
    .modal-bio {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.9;
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }
    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ===== استجابة ===== */
    @media (max-width: 1100px) {
      .staff-grid { grid-template-columns: repeat(3, 1fr); }
      .assistants-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 992px) {
      .staff-grid { grid-template-columns: repeat(2, 1fr); }
      .assistants-grid { grid-template-columns: repeat(3, 1fr); }
      .head-card { flex-direction: column; align-items: center; }
      .head-img { width: 180px; height: 180px; }
    }
    @media (max-width: 576px) {
      .staff-grid { grid-template-columns: repeat(2, 1fr); }
      .assistants-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- الهيدر -->
  <div id="site-header"></div>

  <!-- عنوان الصفحة -->
  <div class="page-hero">
    <div class="container">
      <h1>هيئة التدريس</h1>
      <div class="breadcrumb">
        <a href="index.html">الرئيسية</a>
        <span class="sep">&#8249;</span>
        <span>هيئة التدريس</span>
      </div>
    </div>
  </div>

  <!-- المحتوى -->
  <div class="container">
    <div class="staff-page">

      <!-- رئيس القسم -->
      <div class="head-section">
        <div class="head-section-header">رئيس القسم</div>
        <div class="head-card" id="head-card">
          <div class="loading"></div>
        </div>
        <div id="professor-present-section" style="display:none; padding: 0 24px 20px;">
          <div class="staff-grid" id="professor-present-grid"></div>
        </div>
      </div>

      <!-- الأساتذة -->
      <div class="group-section" id="professors-section">
        <div class="group-title"> الأساتذة المساعدون</div>
        <div class="staff-grid" id="professors-grid">
          <div class="loading">جاري التحميل...</div>
        </div>
      </div>


      <!-- المدرسون -->
      <div class="group-section" id="lecturers-section">
        <div class="group-title">المدرسون</div>
        <div class="staff-grid" id="lecturers-grid">
          <div class="loading">جاري التحميل...</div>
        </div>
      </div>

      <!-- المدرسون المساعدون -->
      <div class="group-section" id="lecturer-assistants-section">
        <div class="group-title">المدرسون المساعدون</div>
        <div class="staff-grid" id="lecturer-assistants-grid">
          <div class="loading">جاري التحميل...</div>
        </div>
      </div>

      <!-- المعيدون -->
      <div class="group-section" id="assistants-section">
        <div class="group-title">المعيدون</div>
        <div class="assistants-grid" id="assistants-grid">
          <div class="loading">جاري التحميل...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- مودال التفاصيل -->
  <div class="modal-overlay" id="staff-modal" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">تفاصيل عضو هيئة التدريس</h3>
        <button class="modal-close" onclick="closeModalDirect()">&#215;</button>
      </div>
      <div class="modal-body">
        <div class="modal-person">
          <img id="modal-img" src="" alt="" class="modal-person-img" onerror="this.style.display='none'">
          <div class="modal-person-info">
            <h2 id="modal-name"></h2>
            <div class="m-title" id="modal-position"></div>
            <div class="m-spec"  id="modal-spec"></div>
            <div class="m-email" id="modal-email"></div>
          </div>
        </div>
        <div class="modal-bio" id="modal-bio"></div>
      </div>
      <div class="modal-footer">
        <a id="modal-cv" href="#" target="_blank" class="btn btn-primary btn-sm btn-sm-primary" style="display:none;">
          تحميل السيرة الذاتية
        </a>
        <button class="btn btn-outline btn-sm btn-sm-outline" onclick="closeModalDirect()">إغلاق</button>
      </div>
    </div>
  </div>

  <!-- الفوتر -->
  <div id="site-footer"></div>

  <script src="assets/js/main.js"></script>
  <script>
    'use strict';

    document.addEventListener('DOMContentLoaded', async () => {
      initPage('staff');
      const data = await getData('staff');
      if (!data) return;

      renderHead(data.department_head?.[0]);

      const ppSection = document.getElementById('professor-present-section');
      if (data.professor_present?.length) {
        ppSection.style.display = '';
        renderGroup('professor-present-grid', data.professor_present, false);
      } else {
        ppSection.style.display = 'none';
      }

      renderGroup('professors-grid',          data.professors,           false);
      renderGroup('associate-grid',           data.associate_professors, false);
      renderGroup('lecturers-grid',           data.lecturers,            false);
      renderGroup('lecturer-assistants-grid', data.lecturer_assistants,  false);
      renderGroup('assistants-grid',          data.assistants,           true);
    });

    /* ===== رئيس القسم ===== */
    function renderHead(head) {
      const el = document.getElementById('head-card');
      if (!el || !head) return;

      el.innerHTML = `
        ${head.image
          ? `<img src="${ikUrl(resolveImg(head.image), 'w-360,h-360,c-at_max,q-80,f-auto')}" alt="${head.name}" class="head-img" onerror="this.style.display='none'">`
          : `<div class="head-img-placeholder"></div>`}
        <div class="head-info">
          <h2>${head.name || ''}</h2>
          <div class="head-title">${head.title || ''} &mdash; ${head.position || ''}</div>
          <div class="head-spec">${head.specialization || ''}</div>
          <p class="head-bio">${head.bio || ''}</p>
          <div class="head-actions">
            ${head.email ? `<a href="mailto:${head.email}" class="btn btn-primary" style="font-size:13px;">مراسلة بالبريد</a>` : ''}
            ${head.cv    ? `<a href="${resolveImg(head.cv)}" target="_blank" class="btn btn-outline" style="font-size:13px;">تحميل السيرة الذاتية</a>` : ''}
          </div>
        </div>
      `;
    }

    /* ===== مجموعة أعضاء ===== */
    function renderGroup(gridId, members, isAssistant) {
      const el = document.getElementById(gridId);
      if (!el) return;

      if (!members || !members.length) {
        el.innerHTML = '<div class="empty-state"><p>لا يوجد بيانات</p></div>';
        return;
      }

      if (isAssistant) {
        el.innerHTML = members.map(m => `
          <div class="assistant-card" onclick="openModal('${m.id}')">
            <div class="assistant-card-img-wrap">
              ${m.image
                ? `<img src="${ikUrl(resolveImg(m.image), 'w-200,h-240,c-at_max,q-80,f-auto')}" alt="${m.name}" class="assistant-card-img" onerror="this.style.display='none'">`
                : `<div class="assistant-card-placeholder"></div>`}
            </div>
            <div class="assistant-card-body">
              <div class="assistant-card-name">${m.name || ''}</div>
              <div class="assistant-card-title">${m.title || ''}</div>
              <div class="assistant-card-spec">${m.specialization || ''}</div>
            </div>
          </div>
        `).join('');
      } else {
        el.innerHTML = members.map(m => `
          <div class="staff-card">
            <div class="staff-card-img-wrap">
              ${m.image
                ? `<img src="${ikUrl(resolveImg(m.image), 'w-300,h-320,c-at_max,q-80,f-auto')}" alt="${m.name}" class="staff-card-img" onerror="this.style.display='none'">`
                : `<div class="staff-card-img-placeholder"></div>`}
            </div>
            <div class="staff-card-body">
              <div class="staff-card-name">${m.name || ''}</div>
              <div class="staff-card-title">${m.title || ''}</div>
              <div class="staff-card-spec">${m.specialization || ''}</div>
              ${m.email ? `<div class="staff-card-email">${m.email}</div>` : ''}
              <div class="staff-card-actions">
                <button class="btn-sm btn-sm-primary" onclick="openModal('${m.id}')">التفاصيل</button>
                ${m.cv ? `<a href="${resolveImg(m.cv)}" target="_blank" class="btn-sm btn-sm-outline">السيرة الذاتية</a>` : ''}
              </div>
            </div>
          </div>
        `).join('');
      }
    }

    /* ===== المودال ===== */
    let allMembers = {};

    async function openModal(id) {
      if (!Object.keys(allMembers).length) {
        const data = await getData('staff');
        if (data) {
          const all = [
            ...(data.department_head       || []),
            ...(data.professor_present     || []),
            ...(data.professors            || []),
            ...(data.associate_professors  || []),
            ...(data.lecturers             || []),
            ...(data.lecturer_assistants   || []),
            ...(data.assistants            || [])
          ];
          all.forEach(m => { if (m) allMembers[m.id] = m; });
        }
      }

      const m = allMembers[id];
      if (!m) return;

      document.getElementById('modal-title').textContent    = m.name || '';
      document.getElementById('modal-name').textContent     = m.name || '';
      document.getElementById('modal-position').textContent = `${m.title || ''} - ${m.position || ''}`;
      document.getElementById('modal-spec').textContent     = m.specialization || '';
      document.getElementById('modal-email').textContent    = m.email || '';
      document.getElementById('modal-bio').textContent      = m.bio || 'لا توجد نبذة متاحة حالياً.';

      const imgEl = document.getElementById('modal-img');
      if (m.image) {
        imgEl.src   = ikUrl(resolveImg(m.image), 'w-400,h-480,c-at_max,q-80,f-auto');
        imgEl.alt   = m.name;
        imgEl.style.display = '';
      } else {
        imgEl.style.display = 'none';
      }

      const cvEl = document.getElementById('modal-cv');
      if (m.cv) {
        cvEl.href = resolveImg(m.cv);
        cvEl.style.display = '';
      } else {
        cvEl.style.display = 'none';
      }

      document.getElementById('staff-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
      if (e.target === document.getElementById('staff-modal')) closeModalDirect();
    }

    function closeModalDirect() {
      document.getElementById('staff-modal').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
