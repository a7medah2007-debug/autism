<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشاريع التخرج - قسم اضطراب التوحد - كلية علوم ذوي الاحتياجات الخاصة - جامعة بني سويف</title>
  <meta name="description" content="مشاريع التخرج - قسم اضطراب التوحد - كلية علوم ذوي الاحتياجات الخاصة - جامعة بني سويف">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <style>

    .projects-page { padding: 36px 0; }

    /* ===== شريط الفلترة ===== */
    .filter-bar {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text);
      white-space: nowrap;
    }
    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }
    .filter-btn {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--color-border);
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-main);
    }
    .filter-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    .filter-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }
    .filter-divider {
      width: 1px;
      height: 28px;
      background: var(--color-border);
    }

    /* ===== إحصائيات سريعة ===== */
    .projects-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .pstat-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pstat-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      background: var(--color-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pstat-icon svg { color: var(--color-primary); }
    .pstat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1;
    }
    .pstat-label {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    /* ===== شبكة المشاريع ===== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .project-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }
    .project-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-primary);
      transform: translateY(-2px);
    }
    .project-card-top {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-mid) 100%);
      padding: 16px;
      position: relative;
    }
    .project-year-badge {
      display: inline-block;
      background: var(--color-gold);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .project-card-title {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      line-height: 1.6;
    }
    .project-card-body {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .project-spec-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--color-gold);
      background: var(--color-gold-light);
      padding: 2px 8px;
      border-radius: 2px;
      margin-bottom: 10px;
      border: 1px solid rgba(201,150,12,0.20);
    }
    .project-summary {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.75;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .project-meta-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border);
    }
    .project-meta-item {
      font-size: 12px;
      color: var(--color-text-muted);
      display: flex;
      gap: 5px;
      align-items: flex-start;
    }
    .project-meta-item strong {
      color: var(--color-text);
      font-weight: 700;
      white-space: nowrap;
    }
    .project-card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .btn-xs {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      transition: var(--transition);
      border: 1.5px solid transparent;
      cursor: pointer;
      font-family: var(--font-main);
    }
    .btn-xs-primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .btn-xs-primary:hover { background: var(--color-primary-mid); }
    .btn-xs-outline {
      background: transparent;
      color: var(--color-primary);
      border-color: var(--color-primary);
    }
    .btn-xs-outline:hover { background: var(--color-primary); color: #fff; }

    /* ===== عداد النتائج ===== */
    .results-count {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .results-count span {
      font-weight: 700;
      color: var(--color-primary);
    }

    /* ===== مودال ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      background: var(--color-primary);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }
    .modal-header h3 { font-size: 15px; font-weight: 700; line-height: 1.5; }
    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.8;
      transition: var(--transition);
      flex-shrink: 0;
      margin-right: 10px;
    }
    .modal-close:hover { opacity: 1; }
    .modal-body { padding: 24px; }
    .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .modal-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .tag-year { background: var(--color-primary); color: #fff; }
    .tag-spec { background: var(--color-gold-light); color: var(--color-gold); border: 1px solid rgba(201,150,12,0.25); }
    .tag-sem  { background: var(--color-primary-light); color: var(--color-primary); }
    .modal-section { margin-bottom: 18px; }
    .modal-section h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--color-border);
    }
    .modal-section p {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.85;
    }
    .modal-students {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .modal-student {
      font-size: 13px;
      color: var(--color-text);
      padding: 6px 10px;
      background: var(--color-primary-light);
      border-radius: var(--radius-sm);
      border-right: 3px solid var(--color-primary);
    }
    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--color-border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ===== استجابة ===== */
    @media (max-width: 992px) {
      .projects-grid { grid-template-columns: repeat(2, 1fr); }
      .projects-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .projects-grid { grid-template-columns: 1fr; }
      .filter-bar { flex-direction: column; align-items: flex-start; }
      .filter-divider { display: none; }
      .projects-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <!-- الهيدر -->
  <div id="site-header"></div>

  <!-- عنوان الصفحة -->
  <div class="page-hero">
    <div class="container">
      <h1>مشاريع التخرج</h1>
      <div class="breadcrumb">
        <a href="index.html">الرئيسية</a>
        <span class="sep">&#8249;</span>
        <span>مشاريع التخرج</span>
      </div>
    </div>
  </div>

  <!-- المحتوى -->
  <div class="container">
    <div class="projects-page">

      <!-- إحصائيات سريعة -->
      <div class="projects-stats" id="projects-stats">
        <div class="pstat-card">
          <div class="pstat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
            </svg>
          </div>
          <div>
            <div class="pstat-num" id="total-count">0</div>
            <div class="pstat-label">إجمالي المشاريع</div>
          </div>
        </div>
        <div class="pstat-card">
          <div class="pstat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87"/>
              <path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <div>
            <div class="pstat-num" id="students-count">0</div>
            <div class="pstat-label">إجمالي الطلاب</div>
          </div>
        </div>
        <div class="pstat-card">
          <div class="pstat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div>
            <div class="pstat-num" id="categories-count">0</div>
            <div class="pstat-label">التصنيفات</div>
          </div>
        </div>
        <div class="pstat-card">
          <div class="pstat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8"  x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div>
            <div class="pstat-num" id="statuses-count">0</div>
            <div class="pstat-label">الحالات</div>
          </div>
        </div>
      </div>

      <!-- شريط الفلترة -->
      <div class="filter-bar">
        <span class="filter-label">التصنيف:</span>
        <div class="filter-group" id="category-filters"></div>
        <div class="filter-divider"></div>
        <span class="filter-label">الحالة:</span>
        <div class="filter-group" id="status-filters"></div>
      </div>

      <!-- عداد النتائج -->
      <div class="results-count" id="results-count"></div>

      <!-- شبكة المشاريع -->
      <div class="projects-grid" id="projects-grid">
        <div class="loading">جاري التحميل...</div>
      </div>

    </div>
  </div>

  <!-- مودال التفاصيل -->
  <div class="modal-overlay" id="project-modal" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">تفاصيل المشروع</h3>
        <button class="modal-close" onclick="closeModalDirect()">&#215;</button>
      </div>
      <div class="modal-body">
        <div class="modal-tags" id="modal-tags"></div>
        <div class="modal-section" id="modal-img-section" style="display:none;">
          <img id="modal-cover-img" src="" alt="" style="width:100%;border-radius:8px;object-fit:cover;max-height:220px;">
        </div>
        <div class="modal-section">
          <h4>وصف المشروع</h4>
          <p id="modal-summary"></p>
        </div>
        <div class="modal-section">
          <h4>الطلاب</h4>
          <div class="modal-students" id="modal-students"></div>
        </div>
        <div class="modal-section">
          <h4>المشرفون</h4>
          <p id="modal-supervisor"></p>
        </div>
        <div class="modal-section" id="modal-vr-section" style="display:none;">
          <h4>جهاز الواقع الافتراضي</h4>
          <img id="modal-vr-img" src="" alt="" style="width:100%;border-radius:8px;object-fit:cover;max-height:200px;margin-bottom:10px;">
          <p id="modal-vr-details"></p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-xs btn-xs-outline" onclick="closeModalDirect()">إغلاق</button>
      </div>
    </div>
  </div>

  <!-- الفوتر -->
  <div id="site-footer"></div>

  <script src="assets/js/main.js"></script>
  <script>
    'use strict';

    let allProjects    = [];
    let activeCategory = 'all';
    let activeStatus   = 'all';

    function parseArr(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      try { return JSON.parse(val); } catch (_) { return [String(val)]; }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      initPage('projects');

      const data = await getData('projects');
      if (!data || !data.projects) return;

      allProjects = data.projects.filter(p => p.published);

      renderStats();
      buildFilters();
      renderProjects();
    });

    /* ===== إحصائيات ===== */
    function renderStats() {
      const projects   = allProjects;
      const students   = projects.reduce((acc, p) => acc + parseArr(p.students_names).length, 0);
      const categories = [...new Set(projects.map(p => p.category).filter(Boolean))].length;
      const statuses   = [...new Set(projects.map(p => p.status).filter(Boolean))].length;

      document.getElementById('total-count').textContent      = projects.length;
      document.getElementById('students-count').textContent   = students;
      document.getElementById('categories-count').textContent = categories;
      document.getElementById('statuses-count').textContent   = statuses;
    }

    /* ===== بناء الفلاتر ===== */
    function buildFilters() {
      const categories = [...new Set(allProjects.map(p => p.category).filter(Boolean))].sort();
      const statuses   = [...new Set(allProjects.map(p => p.status).filter(Boolean))].sort();

      const catEl = document.getElementById('category-filters');
      const stEl  = document.getElementById('status-filters');

      catEl.innerHTML = `<button class="filter-btn active" onclick="filterCategory('all', this)">الكل</button>` +
        categories.map(c => `<button class="filter-btn" onclick="filterCategory('${c}', this)">${c}</button>`).join('');

      stEl.innerHTML = `<button class="filter-btn active" onclick="filterStatus('all', this)">الكل</button>` +
        statuses.map(s => `<button class="filter-btn" onclick="filterStatus('${s}', this)">${s}</button>`).join('');
    }

    /* ===== الفلترة ===== */
    function filterCategory(val, btn) {
      activeCategory = val;
      document.querySelectorAll('#category-filters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProjects();
    }

    function filterStatus(val, btn) {
      activeStatus = val;
      document.querySelectorAll('#status-filters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProjects();
    }

    /* ===== عرض المشاريع ===== */
    function renderProjects() {
      const grid    = document.getElementById('projects-grid');
      const countEl = document.getElementById('results-count');
      if (!grid) return;

      let filtered = allProjects;
      if (activeCategory !== 'all') filtered = filtered.filter(p => p.category === activeCategory);
      if (activeStatus   !== 'all') filtered = filtered.filter(p => p.status   === activeStatus);

      countEl.innerHTML = `عرض <span>${filtered.length}</span> من أصل <span>${allProjects.length}</span> مشروع`;

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>لا توجد مشاريع بهذه المعايير</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const students = parseArr(p.students_names);
        const imgHtml  = p.image
          ? `<img src="${resolveImg(p.image)}" alt="${p.title}" style="width:100%;height:160px;object-fit:cover;">`
          : `<div class="project-card-top"><span class="project-year-badge">${p.category || ''}</span><div class="project-card-title">${p.title}</div></div>`;

        return `
        <div class="project-card">
          ${p.image
            ? `<div style="position:relative;overflow:hidden;">
                <img src="${resolveImg(p.image)}" alt="${p.title}" style="width:100%;height:160px;object-fit:cover;display:block;">
                <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 60%);display:flex;align-items:flex-end;padding:12px 16px;">
                  <div style="color:#fff;font-size:14px;font-weight:700;line-height:1.5;">${p.title}</div>
                </div>
                ${p.category ? `<span class="project-year-badge" style="position:absolute;top:10px;right:10px;">${p.category}</span>` : ''}
              </div>`
            : `<div class="project-card-top">
                ${p.category ? `<span class="project-year-badge">${p.category}</span>` : ''}
                <div class="project-card-title">${p.title}</div>
              </div>`
          }
          <div class="project-card-body">
            ${p.status ? `<span class="project-spec-tag">${p.status}</span>` : ''}
            <p class="project-summary">${p.description || ''}</p>
            <div class="project-meta-row">
              ${p.supervisors ? `<div class="project-meta-item"><strong>المشرفون:</strong><span>${p.supervisors}</span></div>` : ''}
              ${students.length ? `<div class="project-meta-item"><strong>الطلاب:</strong><span>${students.join(' - ')}</span></div>` : ''}
            </div>
          </div>
          <div class="project-card-footer">
            <button class="btn-xs btn-xs-primary" onclick="openModal('${p.id}')">التفاصيل</button>
          </div>
        </div>`;
      }).join('');
    }

    /* ===== مودال ===== */
    function openModal(id) {
      const p = allProjects.find(x => x.id === id);
      if (!p) return;

      document.getElementById('modal-title').textContent = p.title;

      document.getElementById('modal-tags').innerHTML = [
        p.category ? `<span class="modal-tag tag-year">${p.category}</span>` : '',
        p.status   ? `<span class="modal-tag tag-spec">${p.status}</span>`   : '',
      ].join('');

      document.getElementById('modal-summary').textContent    = p.description || 'لا يوجد وصف متاح.';
      document.getElementById('modal-supervisor').textContent = p.supervisors || '';

      const students = parseArr(p.students_names);
      document.getElementById('modal-students').innerHTML =
        students.map(s => `<div class="modal-student">${s}</div>`).join('') || '<p style="color:var(--color-text-muted)">لا يوجد</p>';

      const imgSection = document.getElementById('modal-img-section');
      const coverImg   = document.getElementById('modal-cover-img');
      if (p.image) {
        coverImg.src = resolveImg(p.image);
        imgSection.style.display = '';
      } else {
        imgSection.style.display = 'none';
      }

      const vrSection  = document.getElementById('modal-vr-section');
      const vrImg      = document.getElementById('modal-vr-img');
      const vrDetails  = document.getElementById('modal-vr-details');
      if (p.vr_device_image || p.vr_device_details) {
        vrImg.src             = p.vr_device_image ? resolveImg(p.vr_device_image) : '';
        vrImg.style.display   = p.vr_device_image ? '' : 'none';
        vrDetails.textContent = p.vr_device_details || '';
        vrSection.style.display = '';
      } else {
        vrSection.style.display = 'none';
      }

      document.getElementById('project-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
      if (e.target === document.getElementById('project-modal')) closeModalDirect();
    }

    function closeModalDirect() {
      document.getElementById('project-modal').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
