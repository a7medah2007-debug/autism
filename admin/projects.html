<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة مشاريع التخرج - لوحة التحكم</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="icon" href="../specialneed-bsu/assets/images/logo.png" type="image/png">
  <style>
    .project-title-cell {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
    }
    .project-meta-cell {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .year-badge {
      display: inline-block;
      background: var(--gold-light);
      color: var(--gold);
      border: 1px solid rgba(201,150,12,0.25);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
    }
    /* حقل الطلاب الديناميكي */
    .students-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .student-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .student-row input {
      flex: 1;
    }
    .btn-remove-student {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      background: var(--danger-light);
      color: var(--danger);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      transition: var(--transition);
    }
    .btn-remove-student:hover { background: var(--danger); color: #fff; }
    .btn-add-student {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-light);
      border: 1.5px dashed var(--primary);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      cursor: pointer;
      font-family: var(--font);
      width: 100%;
      transition: var(--transition);
      margin-top: 4px;
    }
    .btn-add-student:hover { background: var(--primary); color: #fff; }
    /* رفع الملف */
    .file-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background: var(--bg);
    }
    .file-upload-area:hover { border-color: var(--primary); background: var(--primary-light); }
    .file-upload-area p { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .file-name-display {
      font-size: 12px;
      font-weight: 700;
      color: var(--success);
      margin-top: 8px;
      display: none;
    }
    .file-name-display.show { display: block; }
  </style>
</head>
<body>

<div class="admin-layout">
  <div id="admin-sidebar" class="sidebar"></div>
  <div class="main-area">
    <div id="admin-header"></div>
    <div class="page-content">

      <!-- عنوان الصفحة -->
      <div class="page-header">
        <div>
          <h1>إدارة مشاريع التخرج</h1>
          <p>إضافة وتعديل وحذف مشاريع التخرج</p>
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          إضافة مشروع جديد
        </button>
      </div>

      <!-- شريط البحث -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-body" style="padding:12px 16px;">
          <div class="toolbar">
            <div class="search-input-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" class="search-input" id="search-input"
                     placeholder="بحث بعنوان المشروع أو اسم الطالب أو المشرف..."
                     oninput="renderTable()">
            </div>
            <select class="form-control" style="width:140px;" id="filter-year" onchange="renderTable()">
              <option value="">كل السنوات</option>
            </select>
            <select class="form-control" style="width:160px;" id="filter-spec" onchange="renderTable()">
              <option value="">كل التخصصات</option>
            </select>
            <select class="form-control" style="width:140px;" id="filter-status" onchange="renderTable()">
              <option value="">كل الحالات</option>
              <option value="published">منشور</option>
              <option value="hidden">مخفي</option>
            </select>
            <span class="badge badge-primary" id="result-count">0 مشروع</span>
          </div>
        </div>
      </div>

      <!-- إحصائيات سريعة -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">
        <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:10px;">
          <div class="stat-icon stat-icon-blue" style="width:36px;height:36px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-total" style="font-size:20px;">0</div>
            <div class="stat-label">إجمالي المشاريع</div>
          </div>
        </div>
        <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:10px;">
          <div class="stat-icon stat-icon-gold" style="width:36px;height:36px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-students" style="font-size:20px;">0</div>
            <div class="stat-label">إجمالي الطلاب</div>
          </div>
        </div>
        <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:10px;">
          <div class="stat-icon stat-icon-green" style="width:36px;height:36px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-years" style="font-size:20px;">0</div>
            <div class="stat-label">سنوات دراسية</div>
          </div>
        </div>
        <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:10px;">
          <div class="stat-icon stat-icon-red" style="width:36px;height:36px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-specs" style="font-size:20px;">0</div>
            <div class="stat-label">تخصصات</div>
          </div>
        </div>
      </div>

      <!-- الجدول -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>عنوان المشروع</th>
                <th>التخصص</th>
                <th>السنة</th>
                <th>الطلاب</th>
                <th>المشرف</th>
                <th>الملف</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="projects-tbody">
              <tr class="loading-row">
                <td colspan="9">جاري تحميل البيانات...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ===== مودال الإضافة / التعديل ===== -->
<div class="modal-overlay" id="project-modal" onclick="closeModalOnOverlay(event,'project-modal')">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modal-title">إضافة مشروع جديد</h3>
      <button class="modal-close" onclick="closeModal('project-modal')">&#215;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">

      <!-- عنوان المشروع -->
      <div class="form-group">
        <label class="form-label">عنوان المشروع <span class="req">*</span></label>
        <textarea class="form-control" id="f-title" rows="2"
                  placeholder="أدخل عنوان المشروع كاملاً..."></textarea>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">التخصص <span class="req">*</span></label>
          <select class="form-control" id="f-spec">
            <option value="التوحد">التوحد</option>
            <option value="صعوبات التعلم">صعوبات التعلم</option>
            <option value="الإعاقة الذهنية">الإعاقة الذهنية</option>
            <option value="الإعاقة السمعية">الإعاقة السمعية</option>
            <option value="الإعاقة البصرية">الإعاقة البصرية</option>
            <option value="اضطرابات التواصل">اضطرابات التواصل</option>
            <option value="التربية الخاصة">التربية الخاصة</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">السنة الدراسية <span class="req">*</span></label>
          <input type="text" class="form-control" id="f-year"
                 placeholder="مثال: 2024">
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">الفصل الدراسي</label>
          <select class="form-control" id="f-semester">
            <option value="الفصل الدراسي الأول">الفصل الدراسي الأول</option>
            <option value="الفصل الدراسي الثاني">الفصل الدراسي الثاني</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">المشرف <span class="req">*</span></label>
          <input type="text" class="form-control" id="f-supervisor"
                 placeholder="اسم المشرف كاملاً">
        </div>
      </div>

      <!-- قائمة الطلاب -->
      <div class="form-group">
        <label class="form-label">أسماء الطلاب <span class="req">*</span></label>
        <div class="students-list" id="students-list"></div>
        <button class="btn-add-student" onclick="addStudentRow()">
          + إضافة طالب
        </button>
      </div>

      <!-- ملخص المشروع -->
      <div class="form-group">
        <label class="form-label">ملخص المشروع <span class="req">*</span></label>
        <textarea class="form-control" id="f-summary" rows="3"
                  placeholder="اكتب ملخصاً للمشروع وأهدافه..."></textarea>
      </div>

      <!-- رفع ملف المشروع -->
      <div class="form-group">
        <label class="form-label">ملف المشروع (PDF)</label>
        <div class="file-upload-area" onclick="document.getElementById('file-input').click()">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto;opacity:0.4;">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="12" y1="11" x2="12" y2="17"/>
            <line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
          <p>اضغط لرفع ملف المشروع بصيغة PDF</p>
          <div class="file-name-display" id="file-name">لم يتم رفع ملف</div>
        </div>
        <input type="file" id="file-input" accept="application/pdf" style="display:none;">
        <input type="hidden" id="f-file">
      </div>

      <!-- حالة النشر -->
      <div class="form-group">
        <label class="form-label" style="display:flex;align-items:center;justify-content:space-between;">
          <span>حالة النشر</span>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:400;">
            <input type="checkbox" id="f-published" checked style="cursor:pointer;">
            <span id="publish-label" style="font-size:13px;">منشور</span>
          </label>
        </label>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveProject()">حفظ المشروع</button>
      <button class="btn btn-ghost" onclick="closeModal('project-modal')">إلغاء</button>
    </div>
  </div>
</div>

<script src="assets/js/admin.js"></script>
<script>
  'use strict';

  let projectsData = null;

  document.addEventListener('DOMContentLoaded', async () => {
    checkAuth();
    buildLayout('projects');

    projectsData = await getData('projects');
    if (!projectsData) projectsData = { projects: [], years: [], specializations: [] };

    // تعبئة فلاتر السنة والتخصص
    const years = projectsData.years || [...new Set(projectsData.projects.map(p => p.year))].sort((a,b) => b-a);
    const specs  = projectsData.specializations || [...new Set(projectsData.projects.map(p => p.specialization).filter(Boolean))];
    const yearF  = document.getElementById('filter-year');
    const specF  = document.getElementById('filter-spec');

    years.forEach(y => yearF.innerHTML += `<option value="${y}">${y}</option>`);
    specs.forEach(s => specF.innerHTML += `<option value="${s}">${s}</option>`);

    // السنة الحالية افتراضياً
    document.getElementById('f-year').value = new Date().getFullYear().toString();

    // checkbox النشر
    document.getElementById('f-published').addEventListener('change', function () {
      document.getElementById('publish-label').textContent = this.checked ? 'منشور' : 'مخفي';
    });

    // رفع ملف PDF
    handleFileUpload(
      document.getElementById('file-input'),
      (base64, name) => {
        document.getElementById('f-file').value = base64;
        const nameEl = document.getElementById('file-name');
        nameEl.textContent = name;
        nameEl.classList.add('show');
      }
    );

    // صف طالب افتراضي
    addStudentRow();

    updateStats();
    renderTable();
  });

  /* ===== تحديث الإحصائيات ===== */
  function updateStats() {
    const projects  = projectsData?.projects || [];
    const students  = projects.reduce((a, p) => a + (p.students?.length || 0), 0);
    const years     = [...new Set(projects.map(p => p.year))].length;
    const specs     = [...new Set(projects.map(p => p.specialization).filter(Boolean))].length;

    document.getElementById('s-total').textContent    = projects.length;
    document.getElementById('s-students').textContent = students;
    document.getElementById('s-years').textContent    = years;
    document.getElementById('s-specs').textContent    = specs;
  }

  /* ===== عرض الجدول ===== */
  function renderTable() {
    const tbody   = document.getElementById('projects-tbody');
    const query   = document.getElementById('search-input').value.trim().toLowerCase();
    const yearF   = document.getElementById('filter-year').value;
    const specF   = document.getElementById('filter-spec').value;
    const statusF = document.getElementById('filter-status').value;

    let items = projectsData?.projects || [];

    if (query) {
      items = items.filter(p =>
        p.title.toLowerCase().includes(query) ||
        (p.supervisor || '').toLowerCase().includes(query) ||
        (p.students || []).some(s => s.toLowerCase().includes(query))
      );
    }
    if (yearF)  items = items.filter(p => p.year === yearF);
    if (specF)  items = items.filter(p => p.specialization === specF);
    if (statusF === 'published') items = items.filter(p => p.published);
    if (statusF === 'hidden')    items = items.filter(p => !p.published);

    document.getElementById('result-count').textContent = `${items.length} مشروع`;

    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted);">لا توجد مشاريع</td></tr>`;
      return;
    }

    tbody.innerHTML = items.map((p, i) => `
      <tr>
        <td style="color:var(--text-muted);font-size:12px;">${i + 1}</td>
        <td style="max-width:260px;">
          <div class="project-title-cell">${p.title}</div>
          <div class="project-meta-cell">${p.semester || ''}</div>
        </td>
        <td><span class="badge badge-gold">${p.specialization || ''}</span></td>
        <td><span class="year-badge">${p.year || ''}</span></td>
        <td style="font-size:12px;color:var(--text-muted);max-width:160px;">
          ${(p.students || []).map(s => `<div>${s}</div>`).join('')}
        </td>
        <td style="font-size:12px;">${p.supervisor || ''}</td>
        <td>
          ${p.file
            ? `<span class="badge badge-success">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                  <polyline points="14,2 14,8 20,8"/>
                </svg>
                PDF
              </span>`
            : `<span class="badge" style="background:var(--bg);color:var(--text-muted);">لا يوجد</span>`}
        </td>
        <td>
          <span class="badge ${p.published ? 'badge-success' : 'badge-danger'}">
            ${p.published ? 'منشور' : 'مخفي'}
          </span>
        </td>
        <td>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm btn-icon" onclick="togglePublish('${p.id}')"
                    title="${p.published ? 'إخفاء' : 'نشر'}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                ${p.published
                  ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                     <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                     <line x1="1" y1="1" x2="23" y2="23"/>`
                  : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                     <circle cx="12" cy="12" r="3"/>`}
              </svg>
            </button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="openEditModal('${p.id}')" title="تعديل">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn btn-danger btn-sm btn-icon" onclick="deleteProject('${p.id}')" title="حذف">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
              </svg>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  /* ===== إدارة صفوف الطلاب ===== */
  function addStudentRow(value = '') {
    const list = document.getElementById('students-list');
    const row  = document.createElement('div');
    row.className = 'student-row';
    row.innerHTML = `
      <input type="text" class="form-control student-input"
             placeholder="اسم الطالب رباعياً" value="${escapeHtml(value)}">
      <button class="btn-remove-student" onclick="removeStudentRow(this)" type="button">&#215;</button>
    `;
    list.appendChild(row);
  }

  function removeStudentRow(btn) {
    const list = document.getElementById('students-list');
    if (list.children.length <= 1) {
      showToast('يجب أن يكون هناك طالب واحد على الأقل', 'warning');
      return;
    }
    btn.closest('.student-row').remove();
  }

  function getStudents() {
    return Array.from(document.querySelectorAll('.student-input'))
      .map(i => i.value.trim())
      .filter(v => v);
  }

  /* ===== فتح مودال الإضافة ===== */
  function openAddModal() {
    document.getElementById('modal-title').textContent = 'إضافة مشروع جديد';
    clearForm();
    openModal('project-modal');
  }

  /* ===== فتح مودال التعديل ===== */
  function openEditModal(id) {
    const p = (projectsData?.projects || []).find(x => x.id === id);
    if (!p) return;

    document.getElementById('modal-title').textContent  = 'تعديل المشروع';
    document.getElementById('f-id').value               = p.id;
    document.getElementById('f-title').value            = p.title       || '';
    document.getElementById('f-spec').value             = p.specialization || 'التوحد';
    document.getElementById('f-year').value             = p.year        || '';
    document.getElementById('f-semester').value         = p.semester    || 'الفصل الدراسي الأول';
    document.getElementById('f-supervisor').value       = p.supervisor  || '';
    document.getElementById('f-summary').value          = p.summary     || '';
    document.getElementById('f-file').value             = p.file        || '';
    document.getElementById('f-published').checked      = p.published !== false;
    document.getElementById('publish-label').textContent = p.published !== false ? 'منشور' : 'مخفي';

    // الطلاب
    document.getElementById('students-list').innerHTML = '';
    (p.students || ['']).forEach(s => addStudentRow(s));

    // اسم الملف
    const nameEl = document.getElementById('file-name');
    if (p.file) {
      nameEl.textContent = 'ملف محفوظ';
      nameEl.classList.add('show');
    } else {
      nameEl.textContent = 'لم يتم رفع ملف';
      nameEl.classList.remove('show');
    }

    openModal('project-modal');
  }

  /* ===== تفريغ الفورم ===== */
  function clearForm() {
    document.getElementById('f-id').value      = '';
    document.getElementById('f-title').value   = '';
    document.getElementById('f-year').value    = new Date().getFullYear().toString();
    document.getElementById('f-supervisor').value = '';
    document.getElementById('f-summary').value = '';
    document.getElementById('f-file').value    = '';
    document.getElementById('f-spec').value    = 'التوحد';
    document.getElementById('f-semester').value = 'الفصل الدراسي الأول';
    document.getElementById('f-published').checked = true;
    document.getElementById('publish-label').textContent = 'منشور';
    document.getElementById('file-name').textContent = 'لم يتم رفع ملف';
    document.getElementById('file-name').classList.remove('show');
    document.getElementById('students-list').innerHTML = '';
    addStudentRow();
  }

  /* ===== حفظ المشروع ===== */
  function saveProject() {
    const id         = document.getElementById('f-id').value;
    const title      = document.getElementById('f-title').value.trim();
    const spec       = document.getElementById('f-spec').value;
    const year       = document.getElementById('f-year').value.trim();
    const semester   = document.getElementById('f-semester').value;
    const supervisor = document.getElementById('f-supervisor').value.trim();
    const summary    = document.getElementById('f-summary').value.trim();
    const file       = document.getElementById('f-file').value;
    const published  = document.getElementById('f-published').checked;
    const students   = getStudents();

    if (!title)      { showToast('الرجاء إدخال عنوان المشروع', 'danger'); return; }
    if (!year)       { showToast('الرجاء إدخال السنة الدراسية', 'danger'); return; }
    if (!supervisor) { showToast('الرجاء إدخال اسم المشرف', 'danger'); return; }
    if (!students.length) { showToast('الرجاء إدخال اسم طالب واحد على الأقل', 'danger'); return; }
    if (!summary)    { showToast('الرجاء إدخال ملخص المشروع', 'danger'); return; }

    const projObj = {
      id:             id || generateId(),
      title,
      specialization: spec,
      year, semester, supervisor, students, summary, published,
      file:           file || '',
      image:          ''
    };

    if (!projectsData.projects) projectsData.projects = [];

    if (id) {
      const idx = projectsData.projects.findIndex(p => p.id === id);
      if (idx >= 0) projectsData.projects[idx] = projObj;
    } else {
      projectsData.projects.unshift(projObj);
    }

    saveData('projects', projectsData);
    updateStats();
    renderTable();
    closeModal('project-modal');
    showToast(id ? 'تم تحديث المشروع بنجاح' : 'تمت إضافة المشروع بنجاح');
  }

  /* ===== تبديل حالة النشر ===== */
  function togglePublish(id) {
    const idx = projectsData.projects.findIndex(p => p.id === id);
    if (idx < 0) return;
    projectsData.projects[idx].published = !projectsData.projects[idx].published;
    saveData('projects', projectsData);
    renderTable();
    showToast(projectsData.projects[idx].published ? 'تم نشر المشروع' : 'تم إخفاء المشروع');
  }

  /* ===== حذف المشروع ===== */
  function deleteProject(id) {
    const p = projectsData.projects.find(x => x.id === id);
    showConfirm(
      `هل أنت متأكد من حذف "${truncate(p?.title || '', 40)}"؟`,
      () => {
        projectsData.projects = projectsData.projects.filter(x => x.id !== id);
        saveData('projects', projectsData);
        updateStats();
        renderTable();
        showToast('تم حذف المشروع بنجاح', 'danger');
      }
    );
  }
</script>
</body>
</html>
