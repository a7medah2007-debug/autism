<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - لوحة التحكم</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="icon" href="../specialneed-bsu/assets/images/logo.png" type="image/png">
  <style>
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }
    .login-box .form-group { margin-bottom: 16px; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap svg {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }
    .input-icon-wrap input { padding-right: 36px; }
    .show-pass {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      background: none;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .show-pass:hover { color: var(--primary); }
    .login-submit {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 4px;
    }
    .login-submit:hover { background: var(--primary-mid); }
    .login-submit:disabled { opacity: 0.7; cursor: not-allowed; }
    .login-divider {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin: 16px 0 12px;
      position: relative;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--border);
    }
    .login-divider::before { right: 0; }
    .login-divider::after  { left: 0; }
    .version-tag {
      display: inline-block;
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.50);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 6px;
    }
    /* انيميشن الدخول */
    .login-box {
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="login-page">
  <div>
    <div class="login-box">

      <div class="login-logo">
        <img src="../specialneed-bsu/assets/images/logo.png"
             alt="لوجو الكلية"
             onerror="this.style.display='none'">
        <h1>كلية علوم ذوي الاحتياجات الخاصة</h1>
        <p>جامعة بني سويف</p>
      </div>

      <div class="login-title">لوحة التحكم — تسجيل الدخول</div>

      <div class="login-error" id="login-error">
        اسم المستخدم أو كلمة المرور غير صحيحة
      </div>

      <div class="form-group">
        <label class="form-label">اسم المستخدم</label>
        <div class="input-icon-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text"
                 class="form-control"
                 id="username"
                 placeholder="أدخل اسم المستخدم"
                 autocomplete="username"
                 onkeydown="handleEnter(event)">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <div class="input-icon-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password"
                 class="form-control"
                 id="password"
                 placeholder="أدخل كلمة المرور"
                 autocomplete="current-password"
                 onkeydown="handleEnter(event)">
          <button class="show-pass" onclick="togglePass()" type="button" id="toggle-pass-btn">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="login-divider">دخول آمن مشفر</div>

      <button class="login-submit" id="login-btn" onclick="doLogin()">
        دخول إلى لوحة التحكم
      </button>

    </div>

    <div class="login-footer">
      <div>كلية علوم ذوي الاحتياجات الخاصة &mdash; جامعة بني سويف</div>
      <div class="version-tag">الإصدار 1.0.0</div>
    </div>
  </div>
</div>

<script src="assets/js/admin.js"></script>
<script>
  'use strict';

  /* التحويل للداشبورد لو مسجّل بالفعل يتم في admin.js (بوابة Auth المبكرة) */

  function handleEnter(e) {
    if (e.key === 'Enter') doLogin();
  }

  function togglePass() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      `;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    }
  }

  /* تسجيل الدخول عبر Supabase Auth */
  async function doLogin() {
    const user    = document.getElementById('username').value.trim();
    const pass    = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');
    const btn     = document.getElementById('login-btn');

    errorEl.classList.remove('show');

    if (!user || !pass) {
      errorEl.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
      errorEl.classList.add('show');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'جاري التحقق...';

    const ok = await login(user, pass);

    if (ok) {
      btn.textContent = 'تم التحقق... جاري التحويل';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 400);
    } else {
      errorEl.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
      errorEl.classList.add('show');
      btn.disabled    = false;
      btn.textContent = 'دخول إلى لوحة التحكم';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }
</script>
</body>
</html>
