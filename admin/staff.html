<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة هيئة التدريس - لوحة التحكم</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="icon" href="../specialneed-bsu/assets/images/logo.png" type="image/png">
  <style>
    .rank-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .rank-tab {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: var(--font);
      transition: var(--transition);
    }
    .rank-tab:hover  { border-color: var(--primary); color: var(--primary); }
    .rank-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .rank-count {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      padding: 0 6px;
      border-radius: 10px;
      font-size: 11px;
      margin-right: 4px;
    }
    .rank-tab:not(.active) .rank-count {
      background: var(--primary-light);
      color: var(--primary);
    }
    /* بطاقة عضو في الجدول */
    .member-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .member-cell img {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      object-position: top;
      flex-shrink: 0;
      background: var(--primary-light);
      border: 1px solid var(--border);
    }
    .member-cell-placeholder {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-mid));
    }
    .member-name  { font-size: 13px; font-weight: 700; color: var(--text); }
    .member-email { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    /* صورة المعاينة في المودال */
    .img-preview-wrap {
      position: relative;
      display: inline-block;
    }
    .img-preview-wrap img {
      width: 110px;
      height: 130px;
      object-fit: cover;
      object-position: top;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      display: block;
    }
    .img-preview-wrap .change-btn {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,61,122,0.80);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      padding: 5px;
      cursor: pointer;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
    }
    .cv-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--success-light);
      color: var(--success);
    }
    .cv-badge-none {
      background: var(--bg);
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <div id="admin-sidebar" class="sidebar"></div>
  <div class="main-area">
    <div id="admin-header"></div>
    <div class="page-content">

      <!-- عنوان الصفحة -->
      <div class="page-header">
        <div>
          <h1>إدارة هيئة التدريس</h1>
          <p>إضافة وتعديل وحذف أعضاء هيئة التدريس والمعيدين</p>
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          إضافة عضو جديد
        </button>
      </div>

      <!-- تبويبات الرتب -->
      <div class="rank-tabs" id="rank-tabs">
        <button class="rank-tab active" onclick="switchRank('all',this)">
          الكل <span class="rank-count" id="cnt-all">0</span>
        </button>
        <button class="rank-tab" onclick="switchRank('head',this)">
          رئيس القسم <span class="rank-count" id="cnt-head">1</span>
        </button>
        <button class="rank-tab" onclick="switchRank('professors',this)">
          الأساتذة <span class="rank-count" id="cnt-prof">0</span>
        </button>
        <button class="rank-tab" onclick="switchRank('associate_professors',this)">
          الأساتذة المساعدون <span class="rank-count" id="cnt-assoc">0</span>
        </button>
        <button class="rank-tab" onclick="switchRank('lecturers',this)">
          المدرسون <span class="rank-count" id="cnt-lect">0</span>
        </button>
        <button class="rank-tab" onclick="switchRank('assistants',this)">
          المعيدون <span class="rank-count" id="cnt-asst">0</span>
        </button>
      </div>

      <!-- شريط البحث -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-body" style="padding:12px 16px;">
          <div class="toolbar">
            <div class="search-input-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" class="search-input" id="search-input"
                     placeholder="بحث بالاسم أو التخصص أو البريد..."
                     oninput="filterTable()">
            </div>
            <select class="form-control" style="width:180px;" id="filter-rank" onchange="filterTable()">
              <option value="">كل الرتب</option>
              <option value="رئيس القسم">رئيس القسم</option>
              <option value="أستاذ">أستاذ</option>
              <option value="أستاذ مساعد">أستاذ مساعد</option>
              <option value="مدرس">مدرس</option>
              <option value="معيد">معيد</option>
            </select>
            <span class="badge badge-primary" id="result-count">0 عضو</span>
          </div>
        </div>
      </div>

      <!-- الجدول -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>العضو</th>
                <th>اللقب العلمي</th>
                <th>الرتبة</th>
                <th>التخصص</th>
                <th>السيرة الذاتية</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="staff-tbody">
              <tr class="loading-row">
                <td colspan="8">جاري تحميل البيانات...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ===== مودال الإضافة / التعديل ===== -->
<div class="modal-overlay" id="staff-modal" onclick="closeModalOnOverlay(event,'staff-modal')">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modal-title">إضافة عضو جديد</h3>
      <button class="modal-close" onclick="closeModal('staff-modal')">&#215;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">
      <input type="hidden" id="f-group">

      <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;">
        <!-- صورة العضو -->
        <div>
          <div class="form-label">صورة العضو</div>
          <div class="img-preview-wrap" id="img-wrap">
            <img id="img-preview" src="" alt="صورة العضو"
                 style="display:none;">
            <div id="img-placeholder"
                 style="width:110px;height:130px;background:var(--primary-light);
                        border:2px dashed var(--border);border-radius:var(--radius-sm);
                        display:flex;align-items:center;justify-content:center;
                        cursor:pointer;font-size:12px;color:var(--text-muted);text-align:center;
                        flex-direction:column;gap:6px;"
                 onclick="document.getElementById('img-input').click()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              اضغط لرفع صورة
            </div>
            <div class="change-btn" id="change-img-btn" style="display:none;"
                 onclick="document.getElementById('img-input').click()">
              تغيير الصورة
            </div>
          </div>
          <input type="file" id="img-input" accept="image/*" style="display:none;">
          <div class="form-hint" style="margin-top:6px;max-width:110px;">JPG أو PNG بحد أقصى 5MB</div>
        </div>

        <!-- البيانات الأساسية -->
        <div style="flex:1;">
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">الاسم الرباعي <span class="req">*</span></label>
              <input type="text" class="form-control" id="f-name" placeholder="أ.د. محمد أحمد عبد الله محمد">
            </div>
            <div class="form-group">
              <label class="form-label">اللقب العلمي <span class="req">*</span></label>
              <select class="form-control" id="f-title">
                <option value="أستاذ دكتور">أستاذ دكتور</option>
                <option value="دكتور">دكتور</option>
                <option value="معيد">معيد</option>
                <option value="معيدة">معيدة</option>
                <option value="مدرس مساعد">مدرس مساعد</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">الرتبة الوظيفية <span class="req">*</span></label>
              <select class="form-control" id="f-position">
                <option value="رئيس القسم">رئيس القسم</option>
                <option value="أستاذ">أستاذ</option>
                <option value="أستاذ مساعد">أستاذ مساعد</option>
                <option value="مدرس">مدرس</option>
                <option value="معيد">معيد</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">المجموعة <span class="req">*</span></label>
              <select class="form-control" id="f-group-select" onchange="syncGroup()">
                <option value="professors">الأساتذة</option>
                <option value="associate_professors">الأساتذة المساعدون</option>
                <option value="lecturers">المدرسون</option>
                <option value="assistants">المعيدون</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">التخصص الدقيق <span class="req">*</span></label>
            <input type="text" class="form-control" id="f-spec" placeholder="مثال: التوحد واضطرابات التواصل">
          </div>
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">البريد الإلكتروني</label>
              <input type="email" class="form-control" id="f-email" placeholder="name@specialneed.bsu.edu.eg">
            </div>
            <div class="form-group">
              <label class="form-label">رقم الهاتف</label>
              <input type="tel" class="form-control" id="f-phone" placeholder="01XXXXXXXXX">
            </div>
          </div>
        </div>
      </div>

      <!-- النبذة -->
      <div class="form-group">
        <label class="form-label">النبذة الشخصية</label>
        <textarea class="form-control" id="f-bio" rows="3"
                  placeholder="نبذة مختصرة عن العضو وخبراته وأبحاثه..."></textarea>
      </div>

      <!-- السيرة الذاتية -->
      <div class="form-group">
        <label class="form-label">السيرة الذاتية (PDF)</label>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('cv-input').click()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            رفع ملف PDF
          </button>
          <span id="cv-name" style="font-size:12px;color:var(--text-muted);">لم يتم رفع ملف</span>
          <input type="file" id="cv-input" accept="application/pdf" style="display:none;">
          <input type="hidden" id="f-cv">
        </div>
        <div class="form-hint">حجم الملف لا يتجاوز 10 ميجابايت</div>
      </div>

      <!-- صورة مخزنة -->
      <input type="hidden" id="f-image">

    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveMember()">حفظ</button>
      <button class="btn btn-ghost" onclick="closeModal('staff-modal')">إلغاء</button>
    </div>
  </div>
</div>

<script src="assets/js/admin.js"></script>
<script>
  'use strict';

  let staffData    = null;
  let currentRank  = 'all';
  let allMembers   = [];

  document.addEventListener('DOMContentLoaded', async () => {
    checkAuth();
    buildLayout('staff');

    staffData = await getData('staff');
    if (!staffData) {
      staffData = { department_head: null, professors: [], associate_professors: [], lecturers: [], assistants: [] };
    }

    buildAllMembers();
    updateCounts();
    renderTable();

    // رفع الصورة
    handleImageUpload(
      document.getElementById('img-input'),
      null,
      (base64) => {
        document.getElementById('f-image').value = base64;
        const preview = document.getElementById('img-preview');
        preview.src = base64;
        preview.style.display = 'block';
        document.getElementById('img-placeholder').style.display = 'none';
        document.getElementById('change-img-btn').style.display = 'block';
      }
    );

    // رفع الـ CV
    handleFileUpload(
      document.getElementById('cv-input'),
      (base64, name) => {
        document.getElementById('f-cv').value = base64;
        document.getElementById('cv-name').textContent = name;
        document.getElementById('cv-name').style.color = 'var(--success)';
      }
    );

    // لو فيه ?action=add في الـ URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('action') === 'add') openAddModal();
  });

  /* ===== بناء مصفوفة الأعضاء ===== */
  function buildAllMembers() {
    allMembers = [];
    if (staffData.department_head) {
      allMembers.push({ ...staffData.department_head, _group: 'head' });
    }
    ['professors','associate_professors','lecturers','assistants'].forEach(g => {
      (staffData[g] || []).forEach(m => allMembers.push({ ...m, _group: g }));
    });
  }

  /* ===== تحديث العدادات ===== */
  function updateCounts() {
    document.getElementById('cnt-all').textContent  = allMembers.length;
    document.getElementById('cnt-head').textContent = staffData.department_head ? 1 : 0;
    document.getElementById('cnt-prof').textContent = staffData.professors?.length || 0;
    document.getElementById('cnt-assoc').textContent = staffData.associate_professors?.length || 0;
    document.getElementById('cnt-lect').textContent = staffData.lecturers?.length || 0;
    document.getElementById('cnt-asst').textContent = staffData.assistants?.length || 0;
  }

  /* ===== تبديل الرتبة ===== */
  function switchRank(rank, btn) {
    currentRank = rank;
    document.querySelectorAll('.rank-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  /* ===== فلترة الجدول ===== */
  function filterTable() {
    renderTable();
  }

  /* ===== عرض الجدول ===== */
  function renderTable() {
    const tbody      = document.getElementById('staff-tbody');
    const query      = document.getElementById('search-input').value.trim().toLowerCase();
    const rankFilter = document.getElementById('filter-rank').value;

    let members = allMembers;

    if (currentRank !== 'all') {
      members = members.filter(m => m._group === currentRank);
    }
    if (query) {
      members = members.filter(m =>
        (m.name         || '').toLowerCase().includes(query) ||
        (m.specialization || '').toLowerCase().includes(query) ||
        (m.email        || '').toLowerCase().includes(query)
      );
    }
    if (rankFilter) {
      members = members.filter(m => m.position === rankFilter);
    }

    document.getElementById('result-count').textContent = `${members.length} عضو`;

    if (!members.length) {
      tbody.innerHTML = `
        <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted);">
          لا توجد نتائج
        </td></tr>`;
      return;
    }

    tbody.innerHTML = members.map((m, i) => `
      <tr>
        <td style="color:var(--text-muted);font-size:12px;">${i + 1}</td>
        <td>
          <div class="member-cell">
            ${m.image
              ? (m.image.startsWith('data:')
                  ? `<img src="${m.image}" alt="${m.name}" onerror="this.style.display='none'">`
                  : `<img src="../specialneed-bsu/assets/images/${m.image}" alt="${m.name}" onerror="this.style.display='none'">`)
              : `<div class="member-cell-placeholder"></div>`}
            <div>
              <div class="member-name">${m.name || ''}</div>
              <div class="member-email">${m.email || ''}</div>
            </div>
          </div>
        </td>
        <td><span class="badge badge-primary">${m.title || ''}</span></td>
        <td>${m.position || ''}</td>
        <td style="font-size:12px;color:var(--text-muted);">${m.specialization || ''}</td>
        <td>
          ${m.cv
            ? `<span class="cv-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                  <polyline points="14,2 14,8 20,8"/>
                </svg>
                PDF
              </span>`
            : `<span class="cv-badge cv-badge-none">لا يوجد</span>`}
        </td>
        <td>
          ${m._group === 'head'
            ? `<span class="badge badge-gold">رئيس القسم</span>`
            : `<span class="badge badge-success">نشط</span>`}
        </td>
        <td>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm btn-icon" onclick="openEditModal('${m.id}')" title="تعديل">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            ${m._group !== 'head' ? `
              <button class="btn btn-danger btn-sm btn-icon" onclick="deleteMember('${m.id}','${m._group}')" title="حذف">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                  <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
                </svg>
              </button>` : ''}
          </div>
        </td>
      </tr>
    `).join('');
  }

  /* ===== فتح مودال الإضافة ===== */
  function openAddModal() {
    document.getElementById('modal-title').textContent = 'إضافة عضو جديد';
    clearForm();
    openModal('staff-modal');
  }

  /* ===== فتح مودال التعديل ===== */
  function openEditModal(id) {
    const m = allMembers.find(x => x.id === id);
    if (!m) return;

    document.getElementById('modal-title').textContent = 'تعديل بيانات العضو';
    document.getElementById('f-id').value    = m.id;
    document.getElementById('f-group').value = m._group;
    document.getElementById('f-name').value  = m.name  || '';
    document.getElementById('f-title').value = m.title || 'أستاذ دكتور';
    document.getElementById('f-position').value = m.position || 'أستاذ';
    document.getElementById('f-spec').value  = m.specialization || '';
    document.getElementById('f-email').value = m.email || '';
    document.getElementById('f-phone').value = m.phone || '';
    document.getElementById('f-bio').value   = m.bio   || '';
    document.getElementById('f-image').value = m.image || '';
    document.getElementById('f-cv').value    = m.cv    || '';

    if (m._group !== 'head') {
      document.getElementById('f-group-select').value = m._group;
    }

    // عرض الصورة
    const preview = document.getElementById('img-preview');
    if (m.image) {
      preview.src = m.image.startsWith('data:')
        ? m.image
        : `../specialneed-bsu/assets/images/${m.image}`;
      preview.style.display = 'block';
      document.getElementById('img-placeholder').style.display = 'none';
      document.getElementById('change-img-btn').style.display  = 'block';
    } else {
      preview.style.display = 'none';
      document.getElementById('img-placeholder').style.display = 'flex';
      document.getElementById('change-img-btn').style.display  = 'none';
    }

    // اسم الـ CV
    document.getElementById('cv-name').textContent = m.cv ? 'ملف محفوظ' : 'لم يتم رفع ملف';
    document.getElementById('cv-name').style.color = m.cv ? 'var(--success)' : '';

    openModal('staff-modal');
  }

  /* ===== مزامنة المجموعة ===== */
  function syncGroup() {
    document.getElementById('f-group').value = document.getElementById('f-group-select').value;
  }

  /* ===== تفريغ الفورم ===== */
  function clearForm() {
    ['f-id','f-name','f-spec','f-email','f-phone','f-bio','f-image','f-cv'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-title').value    = 'أستاذ دكتور';
    document.getElementById('f-position').value = 'أستاذ';
    document.getElementById('f-group-select').value = 'professors';
    document.getElementById('f-group').value    = 'professors';
    document.getElementById('img-preview').style.display    = 'none';
    document.getElementById('img-placeholder').style.display = 'flex';
    document.getElementById('change-img-btn').style.display  = 'none';
    document.getElementById('cv-name').textContent = 'لم يتم رفع ملف';
    document.getElementById('cv-name').style.color = '';
  }

  /* ===== حفظ العضو ===== */
  function saveMember() {
    const id       = document.getElementById('f-id').value;
    const group    = document.getElementById('f-group').value || document.getElementById('f-group-select').value;
    const name     = document.getElementById('f-name').value.trim();
    const title    = document.getElementById('f-title').value;
    const position = document.getElementById('f-position').value;
    const spec     = document.getElementById('f-spec').value.trim();
    const email    = document.getElementById('f-email').value.trim();
    const phone    = document.getElementById('f-phone').value.trim();
    const bio      = document.getElementById('f-bio').value.trim();
    const image    = document.getElementById('f-image').value;
    const cv       = document.getElementById('f-cv').value;

    if (!name)  { showToast('الرجاء إدخال الاسم', 'danger'); return; }
    if (!spec)  { showToast('الرجاء إدخال التخصص', 'danger'); return; }

    const memberObj = {
      id:             id || generateId(),
      name, title, position,
      specialization: spec,
      email, phone, bio,
      image: image || '',
      cv:    cv    || ''
    };

    if (!id) {
      // إضافة جديد
      if (position === 'رئيس القسم') {
        staffData.department_head = { ...memberObj, id: 'head_001' };
      } else {
        if (!staffData[group]) staffData[group] = [];
        staffData[group].push(memberObj);
      }
    } else {
      // تعديل موجود
      if (group === 'head') {
        staffData.department_head = { ...staffData.department_head, ...memberObj };
      } else {
        const arr = staffData[group] || [];
        const idx = arr.findIndex(m => m.id === id);
        if (idx >= 0) arr[idx] = memberObj;
        else arr.push(memberObj);
        staffData[group] = arr;
      }
    }

    saveData('staff', staffData);
    buildAllMembers();
    updateCounts();
    renderTable();
    closeModal('staff-modal');
    showToast(id ? 'تم تحديث بيانات العضو بنجاح' : 'تمت إضافة العضو بنجاح');
  }

  /* ===== حذف عضو ===== */
  function deleteMember(id, group) {
    const m = allMembers.find(x => x.id === id);
    showConfirm(
      `هل أنت متأكد من حذف "${m?.name || 'هذا العضو'}"؟ لا يمكن التراجع عن هذا الإجراء.`,
      () => {
        if (group === 'head') {
          staffData.department_head = null;
        } else {
          staffData[group] = (staffData[group] || []).filter(m => m.id !== id);
        }
        saveData('staff', staffData);
        buildAllMembers();
        updateCounts();
        renderTable();
        showToast('تم حذف العضو بنجاح', 'danger');
      }
    );
  }
</script>
