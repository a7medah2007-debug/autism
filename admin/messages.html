<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الرسائل الواردة - لوحة التحكم</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="icon" href="../specialneed-bsu/assets/images/logo.png" type="image/png">
  <style>
    /* ===== بطاقات الإحصائيات العلوية ===== */
    .msg-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    /* ===== تخطيط الصفحة ===== */
    .messages-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ===== قائمة الرسائل ===== */
    .msg-list {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .msg-list-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }
    .msg-list-header h2 { font-size: 14px; font-weight: 700; color: var(--primary); }

    .msg-item {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }
    .msg-item:last-child { border-bottom: none; }
    .msg-item:hover { background: var(--primary-light); }
    .msg-item.active { background: var(--primary-light); border-right: 3px solid var(--primary); }
    .msg-item.unread .msg-sender { font-weight: 700; }
    .msg-item.unread::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }

    .msg-sender {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .msg-sender-name { font-weight: 600; }
    .msg-sender-date { font-size: 10px; color: var(--text-muted); font-weight: 400; }
    .msg-subject {
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-preview {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== عرض الرسالة ===== */
    .msg-view {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .msg-view-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .msg-view-subject {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .msg-view-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .msg-meta-item {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .msg-meta-item strong { color: var(--text); font-weight: 700; }
    .msg-view-body {
      padding: 24px;
      min-height: 200px;
    }
    .msg-view-body p {
      font-size: 14px;
      color: var(--text);
      line-height: 2;
    }
    .msg-view-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--text-muted);
      gap: 12px;
    }
    .msg-view-empty svg { opacity: 0.2; }
    .msg-view-empty p { font-size: 14px; }
    .msg-view-actions {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      background: var(--bg);
    }

    /* ===== شريط الأدوات ===== */
    .msg-toolbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    @media (max-width: 992px) {
      .messages-layout { grid-template-columns: 1fr; }
      .msg-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <div id="admin-sidebar" class="sidebar"></div>
  <div class="main-area">
    <div id="admin-header"></div>
    <div class="page-content">

      <!-- عنوان الصفحة -->
      <div class="page-header">
        <div>
          <h1>الرسائل الواردة</h1>
          <p>رسائل زوار الموقع من نموذج التواصل</p>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteAllRead()">
          حذف المقروءة
        </button>
      </div>

      <!-- إحصائيات -->
      <div class="msg-stats">
        <div class="stat-card">
          <div class="stat-icon stat-icon-blue">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-total">0</div>
            <div class="stat-label">إجمالي الرسائل</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-red">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-unread">0</div>
            <div class="stat-label">غير مقروءة</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-green">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-read">0</div>
            <div class="stat-label">مقروءة</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-gold">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <div>
            <div class="stat-num" id="s-today">0</div>
            <div class="stat-label">رسائل اليوم</div>
          </div>
        </div>
      </div>

      <!-- تخطيط الرسائل -->
      <div class="messages-layout">

        <!-- قائمة الرسائل -->
        <div class="msg-list">
          <div class="msg-list-header">
            <h2>صندوق الوارد</h2>
            <span class="badge badge-primary" id="list-count">0</span>
          </div>

          <!-- شريط الأدوات -->
          <div class="msg-toolbar">
            <select class="form-control" style="font-size:12px;padding:5px 8px;height:auto;"
                    id="filter-status" onchange="renderList()">
              <option value="">الكل</option>
              <option value="unread">غير مقروءة</option>
              <option value="read">مقروءة</option>
            </select>
            <select class="form-control" style="font-size:12px;padding:5px 8px;height:auto;"
                    id="filter-subject" onchange="renderList()">
              <option value="">كل الجهات</option>
              <option value="academic">شؤون أكاديمية</option>
              <option value="admin">الإدارة</option>
              <option value="research">البحث العلمي</option>
              <option value="media">الإعلام</option>
              <option value="other">أخرى</option>
            </select>
            <button class="btn btn-ghost btn-sm" onclick="markAllRead()" title="تحديد الكل كمقروء">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
              </svg>
            </button>
          </div>

          <div id="msg-list-body">
            <div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">
              جاري التحميل...
            </div>
          </div>
        </div>

        <!-- عرض الرسالة -->
        <div class="msg-view">
          <div id="msg-view-content">
            <div class="msg-view-empty">
              <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <p>اختر رسالة لعرضها</p>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="assets/js/admin.js"></script>
<script>
  'use strict';

  let messages       = [];
  let activeId       = null;

  const SUBJECTS = {
    academic: 'شؤون أكاديمية',
    admin:    'الإدارة',
    research: 'البحث العلمي',
    media:    'الإعلام والعلاقات العامة',
    other:    'أخرى'
  };

  document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    buildLayout('messages');

    messages = loadData('contact_messages') || [];
    updateStats();
    renderList();
  });

  /* ===== تحديث الإحصائيات ===== */
  function updateStats() {
    const now     = new Date();
    const todayStr = now.toDateString();
    const unread  = messages.filter(m => !m.read).length;
    const today   = messages.filter(m => new Date(m.date).toDateString() === todayStr).length;

    document.getElementById('s-total').textContent  = messages.length;
    document.getElementById('s-unread').textContent = unread;
    document.getElementById('s-read').textContent   = messages.length - unread;
    document.getElementById('s-today').textContent  = today;
  }

  /* ===== عرض قائمة الرسائل ===== */
  function renderList() {
    const listEl    = document.getElementById('msg-list-body');
    const statusF   = document.getElementById('filter-status').value;
    const subjectF  = document.getElementById('filter-subject').value;

    let items = [...messages].reverse();

    if (statusF === 'unread') items = items.filter(m => !m.read);
    if (statusF === 'read')   items = items.filter(m => m.read);
    if (subjectF)             items = items.filter(m => m.subject === subjectF);

    document.getElementById('list-count').textContent = items.length;

    if (!items.length) {
      listEl.innerHTML = `
        <div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px;">
          لا توجد رسائل
        </div>`;
      return;
    }

    listEl.innerHTML = items.map(m => `
      <div class="msg-item ${!m.read ? 'unread' : ''} ${activeId === m.id ? 'active' : ''}"
           onclick="viewMessage('${m.id}')">
        <div class="msg-sender">
          <span class="msg-sender-name">${escapeHtml(m.name)}</span>
          <span class="msg-sender-date">${formatDateShort(m.date)}</span>
        </div>
        <div class="msg-subject">${escapeHtml(m.title)}</div>
        <div class="msg-preview">${escapeHtml(m.message)}</div>
      </div>
    `).join('');
  }

  /* ===== عرض رسالة ===== */
  function viewMessage(id) {
    activeId = id;
    const m = messages.find(x => x.id === id);
    if (!m) return;

    // تحديد كمقروءة
    if (!m.read) {
      m.read = true;
      saveData('contact_messages', messages);
      updateStats();
    }

    renderList();

    const subjectLabel = SUBJECTS[m.subject] || m.subject || '';
    const dateStr      = new Date(m.date).toLocaleDateString('ar-EG', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    document.getElementById('msg-view-content').innerHTML = `
      <div class="msg-view-header">
        <div class="msg-view-subject">${escapeHtml(m.title)}</div>
        <div class="msg-view-meta">
          <div class="msg-meta-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <strong>المرسل:</strong> ${escapeHtml(m.name)}
          </div>
          <div class="msg-meta-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <strong>البريد:</strong>
            <a href="mailto:${escapeHtml(m.email)}" style="color:var(--primary);">${escapeHtml(m.email)}</a>
          </div>
          ${m.phone ? `
          <div class="msg-meta-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81"/>
            </svg>
            <strong>الهاتف:</strong> ${escapeHtml(m.phone)}
          </div>` : ''}
          <div class="msg-meta-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8"  y1="2" x2="8"  y2="6"/>
              <line x1="3"  y1="10" x2="21" y2="10"/>
            </svg>
            <strong>التاريخ:</strong> ${dateStr}
          </div>
          ${subjectLabel ? `
          <div class="msg-meta-item">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <strong>الجهة:</strong>
            <span class="badge badge-primary">${escapeHtml(subjectLabel)}</span>
          </div>` : ''}
        </div>
      </div>
      <div class="msg-view-body">
        <p>${escapeHtml(m.message).replace(/\n/g, '<br>')}</p>
      </div>
      <div class="msg-view-actions">
        <a href="mailto:${escapeHtml(m.email)}?subject=رد: ${escapeHtml(m.title)}"
           class="btn btn-primary btn-sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          رد بالبريد
        </a>
        <button class="btn btn-ghost btn-sm" onclick="toggleRead('${m.id}')">
          ${m.read ? 'تحديد كغير مقروء' : 'تحديد كمقروء'}
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteMessage('${m.id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          </svg>
          حذف
        </button>
      </div>
    `;
  }

  /* ===== تبديل حالة القراءة ===== */
  function toggleRead(id) {
    const m = messages.find(x => x.id === id);
    if (!m) return;
    m.read = !m.read;
    saveData('contact_messages', messages);
    updateStats();
    renderList();
    viewMessage(id);
  }

  /* ===== تحديد الكل كمقروء ===== */
  function markAllRead() {
    messages.forEach(m => m.read = true);
    saveData('contact_messages', messages);
    updateStats();
    renderList();
    showToast('تم تحديد جميع الرسائل كمقروءة');
  }

  /* ===== حذف رسالة ===== */
  function deleteMessage(id) {
    showConfirm('هل أنت متأكد من حذف هذه الرسالة؟', () => {
      messages = messages.filter(x => x.id !== id);
      saveData('contact_messages', messages);
      activeId = null;
      document.getElementById('msg-view-content').innerHTML = `
        <div class="msg-view-empty">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <p>اختر رسالة لعرضها</p>
        </div>`;
      updateStats();
      renderList();
      showToast('تم حذف الرسالة', 'danger');
    });
  }

  /* ===== حذف المقروءة ===== */
  function deleteAllRead() {
    const readCount = messages.filter(m => m.read).length;
    if (!readCount) { showToast('لا توجد رسائل مقروءة', 'warning'); return; }
    showConfirm(
      `هل أنت متأكد من حذف ${readCount} رسالة مقروءة؟`,
      () => {
        messages = messages.filter(m => !m.read);
        saveData('contact_messages', messages);
        activeId = null;
        document.getElementById('msg-view-content').innerHTML = `
          <div class="msg-view-empty">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <p>اختر رسالة لعرضها</p>
          </div>`;
        updateStats();
        renderList();
        showToast(`تم حذف ${readCount} رسالة مقروءة`, 'danger');
      }
    );
  }

  /* ===== تنسيق التاريخ المختصر ===== */
  function formatDateShort(dateStr) {
    if (!dateStr) return '';
    const d   = new Date(dateStr);
    const now  = new Date();
    const diff = now - d;

    if (diff < 60000)           return 'الآن';
    if (diff < 3600000)         return `${Math.floor(diff/60000)} د`;
    if (diff < 86400000)        return `${Math.floor(diff/3600000)} س`;
    if (diff < 604800000)       return `${Math.floor(diff/86400000)} ي`;
    return d.toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
  }
</script>
</body>
</html>
