<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الفعاليات - لوحة التحكم</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
  <style>
    .event-date-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      min-width: 48px;
      text-align: center;
    }
    .event-date-cell .day   { font-size: 18px; font-weight: 700; line-height: 1; }
    .event-date-cell .month { font-size: 10px; opacity: 0.85; margin-top: 2px; }
    .event-title-cell { font-size: 13px; font-weight: 700; color: var(--text); }
    .event-meta-cell  { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .img-preview-box {
      width: 100%;
      height: 140px;
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: var(--transition);
      background: var(--bg);
      position: relative;
    }
    .img-preview-box:hover { border-color: var(--primary); background: var(--primary-light); }
    .img-preview-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .img-preview-box img.show { display: block; }
    .upload-hint {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 12px; text-align: center;
    }
    .img-overlay {
      position: absolute; inset: 0;
      background: rgba(10,61,122,0.6);
      display: none; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 700;
    }
    .img-preview-box:hover .img-overlay { display: flex; }
  </style>
</head>
<body>

<div class="admin-layout">
  <div id="admin-sidebar" class="sidebar"></div>
  <div class="main-area">
    <div id="admin-header"></div>
    <div class="page-content">

      <!-- عنوان الصفحة -->
      <div class="page-header">
        <div>
          <h1>إدارة الفعاليات</h1>
          <p>إضافة وتعديل وحذف الفعاليات والأحداث</p>
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          إضافة فعالية جديدة
        </button>
      </div>

      <!-- شريط البحث -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-body" style="padding:12px 16px;">
          <div class="toolbar">
            <div class="search-input-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" class="search-input" id="search-input"
                     placeholder="بحث في عنوان الفعالية أو المكان..."
                     oninput="renderTable()">
            </div>
            <select class="form-control" style="width:160px;" id="filter-cat" onchange="renderTable()">
              <option value="">كل التصنيفات</option>
              <option value="مؤتمرات">مؤتمرات</option>
              <option value="ورش عمل">ورش عمل</option>
              <option value="فعاليات">فعاليات</option>
              <option value="احتفاليات">احتفاليات</option>
              <option value="ندوات">ندوات</option>
              <option value="معارض">معارض</option>
              <option value="زيارات">زيارات</option>
            </select>
            <select class="form-control" style="width:140px;" id="filter-status" onchange="renderTable()">
              <option value="">كل الحالات</option>
              <option value="published">منشور</option>
              <option value="hidden">مخفي</option>
            </select>
            <span class="badge badge-primary" id="result-count">0 فعالية</span>
          </div>
        </div>
      </div>

      <!-- الجدول -->
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>التاريخ</th>
                <th>الفعالية</th>
                <th>التصنيف</th>
                <th>الوقت</th>
                <th>المكان</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="events-tbody">
              <tr class="loading-row">
                <td colspan="8">جاري تحميل البيانات...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ===== مودال الإضافة / التعديل ===== -->
<div class="modal-overlay" id="event-modal" onclick="closeModalOnOverlay(event,'event-modal')">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modal-title">إضافة فعالية جديدة</h3>
      <button class="modal-close" onclick="closeModal('event-modal')">&#215;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">

      <!-- العنوان والتصنيف -->
      <div class="form-group">
        <label class="form-label">عنوان الفعالية <span class="req">*</span></label>
        <input type="text" class="form-control" id="f-title" placeholder="أدخل عنوان الفعالية كاملاً">
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">التصنيف <span class="req">*</span></label>
          <select class="form-control" id="f-category">
            <option value="مؤتمرات">مؤتمرات</option>
            <option value="ورش عمل">ورش عمل</option>
            <option value="فعاليات">فعاليات</option>
            <option value="احتفاليات">احتفاليات</option>
            <option value="ندوات">ندوات</option>
            <option value="معارض">معارض</option>
            <option value="زيارات">زيارات</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">حالة النشر</label>
          <div style="display:flex;align-items:center;gap:10px;padding-top:8px;">
            <input type="checkbox" id="f-published" checked style="cursor:pointer;width:16px;height:16px;">
            <span id="publish-label" style="font-size:13px;font-weight:600;">منشور</span>
          </div>
        </div>
      </div>

      <!-- التواريخ والوقت -->
      <div class="form-grid-2" style="margin-bottom:0;">
        <div class="form-group">
          <label class="form-label">تاريخ البداية <span class="req">*</span></label>
          <input type="date" class="form-control" id="f-date-start">
        </div>
        <div class="form-group">
          <label class="form-label">تاريخ النهاية</label>
          <input type="date" class="form-control" id="f-date-end">
          <div class="form-hint">اتركه فارغاً إذا كانت الفعالية يوم واحد</div>
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">وقت البداية <span class="req">*</span></label>
          <input type="text" class="form-control" id="f-time" placeholder="09:00 صباحاً">
        </div>
        <div class="form-group">
          <label class="form-label">المكان <span class="req">*</span></label>
          <input type="text" class="form-control" id="f-location"
                 placeholder="مثال: قاعة المؤتمرات الكبرى - جامعة بني سويف">
        </div>
      </div>

      <!-- الملخص والمحتوى -->
      <div class="form-group">
        <label class="form-label">ملخص الفعالية <span class="req">*</span></label>
        <textarea class="form-control" id="f-summary" rows="2"
                  placeholder="وصف مختصر يظهر في قائمة الفعاليات..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">تفاصيل الفعالية الكاملة</label>
        <textarea class="form-control" id="f-content" rows="4"
                  placeholder="اكتب تفاصيل الفعالية الكاملة هنا..."></textarea>
      </div>

      <!-- الصورة -->
      <div class="form-group">
        <label class="form-label">صورة الفعالية</label>
        <div class="img-preview-box" onclick="document.getElementById('img-input').click()">
          <div class="upload-hint" id="upload-hint">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.4;">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            اضغط لرفع صورة
          </div>
          <img id="img-preview" alt="صورة الفعالية">
          <div class="img-overlay">تغيير الصورة</div>
        </div>
        <input type="file" id="img-input" accept="image/*" style="display:none;">
        <input type="hidden" id="f-image">
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveEvent()">حفظ الفعالية</button>
      <button class="btn btn-ghost" onclick="closeModal('event-modal')">إلغاء</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/imagekit-javascript/dist/imagekit.min.js"></script>
<script src="assets/js/admin.js"></script>
<script>
  'use strict';

  /* ═══════════════════════════════════════════════════════
     Admin Credentials (dev phase — hardcoded)
     ═══════════════════════════════════════════════════════ */
  const SUPABASE_URL              = 'https://taplgfctwktiwikiyjhr.supabase.co';
  const SUPABASE_ANON_KEY         = 'sb_publishable_brFIWbJS5eXa2liIySOxlA_NCrDwFQD';
  const SUPABASE_SERVICE_ROLE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhcGxnZmN0d2t0aXdpa2l5amhyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODE4MjQ5NiwiZXhwIjoyMDkzNzU4NDk2fQ.t0UGyub-2acXX-jlXwSGjGbX4f9kV8Fk2aSAIW3_TTo';
  const IMAGEKIT_PUBLIC_KEY       = 'public_UX9ff6muz2Vdpj6YH6hB2xxBi/Y=';
  const IMAGEKIT_PRIVATE_KEY      = 'private_AXgco1S6rygOVwrSdEmP4Pr2VW8=';
  const IMAGEKIT_URL_ENDPOINT     = 'https://ik.imagekit.io/autism';

  /* ═══════════════════════════════════════════════════════
     Supabase REST helpers  (service-role key → bypasses RLS)
     ═══════════════════════════════════════════════════════ */
  function _sbHead(extra) {
    return Object.assign({
      'apikey':        SUPABASE_SERVICE_ROLE_KEY,
      'Authorization': `Bearer ${SUPABASE_SERVICE_ROLE_KEY}`
    }, extra || {});
  }

  async function _loadEvents() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/events?order=date_start.desc`,
      { headers: _sbHead() }
    );
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
    const data = await res.json();
    return { events: data || [] };   // wrap so eventsData.events is always an array
  }

  async function _upsertEvent(record) {
    const isNew = !record.id;
    const url   = isNew
      ? `${SUPABASE_URL}/rest/v1/events`
      : `${SUPABASE_URL}/rest/v1/events?id=eq.${encodeURIComponent(record.id)}`;
    const res = await fetch(url, {
      method:  isNew ? 'POST' : 'PATCH',
      headers: _sbHead({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
      body:    JSON.stringify(record)
    });
    if (!res.ok) {
      const b = await res.json().catch(() => ({}));
      throw new Error(b.message || `Supabase ${res.status}`);
    }
    const rows = await res.json();
    return Array.isArray(rows) ? rows[0] : rows;
  }

  async function _patchEvent(id, patch) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/events?id=eq.${encodeURIComponent(id)}`,
      { method: 'PATCH', headers: _sbHead({ 'Content-Type': 'application/json' }), body: JSON.stringify(patch) }
    );
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
  }

  async function _deleteEventRow(id) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/events?id=eq.${encodeURIComponent(id)}`,
      { method: 'DELETE', headers: _sbHead() }
    );
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
  }

  /* ── Page state ── */
  let eventsData       = { events: [] };
  let _stagedImageFile = null;

  document.addEventListener('DOMContentLoaded', async () => {
    checkAuth();
    buildLayout('events');

    document.getElementById('f-date-start').value = new Date().toISOString().split('T')[0];

    document.getElementById('f-published').addEventListener('change', function () {
      document.getElementById('publish-label').textContent = this.checked ? 'منشور' : 'مخفي';
    });

    /* Stage image for upload on save */
    document.getElementById('img-input').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      _stagedImageFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        const preview = document.getElementById('img-preview');
        preview.src = e.target.result;
        preview.classList.add('show');
        document.getElementById('upload-hint').style.display = 'none';
      };
      reader.readAsDataURL(file);
      this.value = '';
    });

    try {
      eventsData = await _loadEvents();
    } catch (e) {
      showToast('حدث خطأ أثناء تحميل البيانات', 'danger');
      eventsData = { events: [] };
    }
    renderTable();

    const params = new URLSearchParams(window.location.search);
    if (params.get('action') === 'add') openAddModal();
    const editId = params.get('edit');
    if (editId) openEditModal(editId);
  });

  /* ===== عرض الجدول ===== */
  function renderTable() {
    const tbody   = document.getElementById('events-tbody');
    const query   = document.getElementById('search-input').value.trim().toLowerCase();
    const catF    = document.getElementById('filter-cat').value;
    const statusF = document.getElementById('filter-status').value;

    let items = eventsData?.events || [];

    if (query)   items = items.filter(e =>
      e.title.toLowerCase().includes(query) ||
      (e.location || '').toLowerCase().includes(query)
    );
    if (catF)                    items = items.filter(e => e.category === catF);
    if (statusF === 'published') items = items.filter(e => e.published);
    if (statusF === 'hidden')    items = items.filter(e => !e.published);

    document.getElementById('result-count').textContent = `${items.length} فعالية`;

    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted);">لا توجد فعاليات</td></tr>`;
      return;
    }

    tbody.innerHTML = items.map((e, i) => {
      const d     = new Date(e.date_start);
      const day   = d.getDate();
      const month = d.toLocaleDateString('ar-EG', { month: 'short' });
      return `
        <tr>
          <td style="color:var(--text-muted);font-size:12px;">${i + 1}</td>
          <td>
            <div class="event-date-cell">
              <div class="day">${day}</div>
              <div class="month">${month}</div>
            </div>
          </td>
          <td>
            <div class="event-title-cell">${e.title}</div>
            <div class="event-meta-cell">${e.summary ? truncate(e.summary, 50) : ''}</div>
          </td>
          <td><span class="badge badge-gold">${e.category || ''}</span></td>
          <td style="font-size:12px;white-space:nowrap;">${e.time || ''}</td>
          <td style="font-size:12px;color:var(--text-muted);">${truncate(e.location || '', 35)}</td>
          <td>
            <span class="badge ${e.published ? 'badge-success' : 'badge-danger'}">
              ${e.published ? 'منشور' : 'مخفي'}
            </span>
          </td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-ghost btn-sm btn-icon" onclick="togglePublish('${e.id}')"
                      title="${e.published ? 'إخفاء' : 'نشر'}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  ${e.published
                    ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                       <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                       <line x1="1" y1="1" x2="23" y2="23"/>`
                    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                       <circle cx="12" cy="12" r="3"/>`}
                </svg>
              </button>
              <button class="btn btn-ghost btn-sm btn-icon" onclick="openEditModal('${e.id}')" title="تعديل">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn btn-danger btn-sm btn-icon" onclick="deleteEvent('${e.id}')" title="حذف">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                  <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  /* ===== فتح مودال الإضافة ===== */
  function openAddModal() {
    document.getElementById('modal-title').textContent = 'إضافة فعالية جديدة';
    clearForm();
    openModal('event-modal');
  }

  /* ===== فتح مودال التعديل ===== */
  function openEditModal(id) {
    const e = (eventsData?.events || []).find(x => x.id === id);
    if (!e) return;

    document.getElementById('modal-title').textContent   = 'تعديل الفعالية';
    document.getElementById('f-id').value                = e.id;
    document.getElementById('f-title').value             = e.title      || '';
    document.getElementById('f-category').value          = e.category   || 'فعاليات';
    document.getElementById('f-date-start').value        = e.date_start || '';
    document.getElementById('f-date-end').value          = e.date_end   || '';
    document.getElementById('f-time').value              = e.time       || '';
    document.getElementById('f-location').value          = e.location   || '';
    document.getElementById('f-summary').value           = e.summary    || '';
    document.getElementById('f-content').value           = e.content    || '';
    document.getElementById('f-image').value             = e.image      || '';
    document.getElementById('f-published').checked       = e.published !== false;
    document.getElementById('publish-label').textContent = e.published !== false ? 'منشور' : 'مخفي';

    const preview = document.getElementById('img-preview');
    if (e.image) {
      preview.src = _ikUrl(e.image, 'w-600,h-280,c-at_max,q-80,f-auto');
      preview.classList.add('show');
      document.getElementById('upload-hint').style.display = 'none';
    } else {
      preview.classList.remove('show');
      document.getElementById('upload-hint').style.display = 'flex';
    }
    _stagedImageFile = null;
    openModal('event-modal');
  }

  /* ===== تفريغ الفورم ===== */
  function clearForm() {
    ['f-id','f-title','f-date-end','f-time','f-location',
     'f-summary','f-content','f-image'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-category').value   = 'فعاليات';
    document.getElementById('f-date-start').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-published').checked = true;
    document.getElementById('publish-label').textContent = 'منشور';
    document.getElementById('img-preview').classList.remove('show');
    document.getElementById('upload-hint').style.display = 'flex';
    _stagedImageFile = null;
  }

  /* ═══════════════════════════════════════════════════════
     SAVE  —  sequence:
       1. Validate inputs
       2. Upload staged image → ImageKit  → get public URL
       3. Build record
       4. POST / PATCH → Supabase (service role, bypasses RLS)
     ═══════════════════════════════════════════════════════ */
  async function saveEvent() {
    const id        = document.getElementById('f-id').value;
    const title     = document.getElementById('f-title').value.trim();
    const category  = document.getElementById('f-category').value;
    const dateStart = document.getElementById('f-date-start').value;
    const dateEnd   = document.getElementById('f-date-end').value;
    const time      = document.getElementById('f-time').value.trim();
    const location  = document.getElementById('f-location').value.trim();
    const summary   = document.getElementById('f-summary').value.trim();
    const content   = document.getElementById('f-content').value.trim();
    const published = document.getElementById('f-published').checked;

    if (!title)     { showToast('الرجاء إدخال عنوان الفعالية', 'danger'); return; }
    if (!dateStart) { showToast('الرجاء تحديد تاريخ البداية',  'danger'); return; }
    if (!time)      { showToast('الرجاء إدخال وقت الفعالية',   'danger'); return; }
    if (!location)  { showToast('الرجاء إدخال مكان الفعالية',  'danger'); return; }
    if (!summary)   { showToast('الرجاء إدخال ملخص الفعالية',  'danger'); return; }

    /* ── Step 1: Upload image to ImageKit (only when a new file was staged) ── */
    let imageUrl = document.getElementById('f-image').value || null;

    if (_stagedImageFile) {
      showToast('جارٍ رفع الصورة إلى ImageKit…', 'success');
      try {
        imageUrl = await _ikUpload(_stagedImageFile, '/events');
        _stagedImageFile = null;
      } catch (err) {
        showToast('فشل رفع الصورة: ' + err.message, 'danger');
        return;
      }
    }

    /* ── Step 2: Build the record ── */
    const record = {
      ...(id ? { id } : {}),
      title, category,
      date_start: dateStart,
      date_end:   dateEnd || dateStart,
      time, location, summary, content, published,
      image:  imageUrl || null,
      status: 'upcoming'
    };

    /* ── Step 3: Upsert in Supabase ── */
    try {
      const saved = await _upsertEvent(record);

      if (!eventsData.events) eventsData.events = [];
      if (id) {
        const idx = eventsData.events.findIndex(e => e.id === id);
        if (idx >= 0) eventsData.events[idx] = { ...eventsData.events[idx], ...saved };
      } else {
        eventsData.events.unshift(saved);
      }

      renderTable();
      closeModal('event-modal');
      showToast(id ? 'تم تحديث الفعالية بنجاح' : 'تمت إضافة الفعالية بنجاح');
    } catch (err) {
      showToast('حدث خطأ أثناء الحفظ: ' + err.message, 'danger');
    }
  }

  /* ===== تبديل حالة النشر ===== */
  async function togglePublish(id) {
    const e = (eventsData?.events || []).find(x => x.id === id);
    if (!e) return;
    const newStatus = !e.published;
    try {
      await _patchEvent(id, { published: newStatus });
      e.published = newStatus;
      renderTable();
      showToast(newStatus ? 'تم نشر الفعالية' : 'تم إخفاء الفعالية');
    } catch (err) {
      showToast('حدث خطأ: ' + err.message, 'danger');
    }
  }

  /* ===== حذف الفعالية ===== */
  function deleteEvent(id) {
    const e = (eventsData?.events || []).find(x => x.id === id);
    showConfirm(
      `هل أنت متأكد من حذف "${truncate(e?.title || '', 40)}"؟`,
      async () => {
        try {
          await _deleteEventRow(id);
          eventsData.events = eventsData.events.filter(x => x.id !== id);
          renderTable();
          showToast('تم حذف الفعالية بنجاح', 'danger');
        } catch (err) {
          showToast('حدث خطأ أثناء الحذف: ' + err.message, 'danger');
        }
      }
    );
  }
</script>
</body>
